#  Settings Category Menu
#=========================================================
menu_title: '&8&lSettings'
open_command: settingsmenu
register_command: true
size: 27
items:
  # Navigation bar - highlight current category
  'filler':
    material: BLACK_STAINED_GLASS_PANE
    display_name: ' '
    slots:
      - '0-1'
      - '3'
      - '5'
      - '7-8'
  'pvp_tab':
    material: DIAMOND_SWORD
    slot: 2
    display_name: '&7&lPvP'
    lore:
      - '&eClick to switch!'
    open_gui: 'pvp_menu'
  'kits_tab':
    material: CHEST
    slot: 4
    display_name: '&7&lKits'
    lore:
      - '&eClick to switch!'
    open_gui: 'kits_menu'
  'settings_tab':
    material: COMPARATOR
    slot: 6
    display_name: '&a&lSettings'
    lore:
      - '&aCurrently viewing'
    enchantments:
      - 'UNBREAKING;1'
    hide_enchantments: true
  # Settings items
  'toggle_chat':
    material: WRITABLE_BOOK
    slot: 19
    display_name: '&e&lToggle Chat'
    lore:
      - ''
      - '&7Turn chat on or off'
      - ''
      - '&eClick to toggle!'
    click_commands:
      - '[player] togglechat'
      - '[message] &aChat toggled!'
  'toggle_scoreboard':
    material: PAINTING
    slot: 21
    display_name: '&d&lToggle Scoreboard'
    lore:
      - ''
      - '&7Show or hide the scoreboard'
      - ''
      - '&eClick to toggle!'
    click_commands:
      - '[player] togglescoreboard'
      - '[message] &aScoreboard toggled!'
  # Back button
  'back':
    material: ARROW
    slot: 18
    display_name: '&f&lBack'
    lore:
      - '&7Return to main menu'
    open_gui: 'category_menu_example'
